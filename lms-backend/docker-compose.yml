version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=lms_rocket
      - DB_USER=lms_user
      - DB_PASSWORD=lms_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: air -c .air.toml  # For hot reload in development

  mysql:
    image: mysql:8.0
    container_name: lms-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=lms_rocket
      - MYSQL_USER=lms_user
      - MYSQL_PASSWORD=lms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
  redis_data:
